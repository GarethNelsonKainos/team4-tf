name: Terraform

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  TF_IN_AUTOMATION: true
  # ARM_ variables are read natively by the azurerm provider — no azure/login action needed
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_BLAKE }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET_BLAKE }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_BLAKE }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID_BLAKE }}
  # Terraform variables — TF_VAR_ prefix is picked up automatically
  TF_VAR_environment: dev
  TF_VAR_resource_group_name: team4-new-rg-kainos
  TF_VAR_aad_group_object_id: f2ae751a-9536-4c46-9209-46720122ed4a

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infrastructure
        run: terraform init -input=false

      - name: Terraform fmt check
        working-directory: infrastructure
        run: terraform fmt -check

      - name: Terraform validate
        working-directory: infrastructure
        run: terraform validate

      - name: Terraform plan
        working-directory: infrastructure
        run: terraform plan -input=false -lock-timeout=10m -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infrastructure/tfplan
          retention-days: 1

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: infrastructure
        run: terraform init -input=false

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infrastructure

      - name: Terraform apply
        working-directory: infrastructure
        run: terraform apply -input=false -lock-timeout=10m -auto-approve tfplan
